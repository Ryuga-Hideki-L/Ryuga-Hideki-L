name: stats-card
on:
  schedule:
    - cron: '23 */6 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Сгенерировать карточку
        env:
          GH_TOKEN: ${{ secrets.STATS_TOKEN }}
        run: python3 scripts/gen_stats.py
      - name: Закоммитить, если изменилось
        run: |
          git config user.name "Ryuga-Hideki-L"
          git config user.email "186344516+Ryuga-Hideki-L@users.noreply.github.com"
          git add stats.svg
          git diff --cached --quiet || (git commit -m "stats: авто-обновление карточки" && git push)
